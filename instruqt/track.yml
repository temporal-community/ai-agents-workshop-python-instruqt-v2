title: Building Durable AI Agents with Python and Temporal
teaser: From a hand-written agentic loop to heterogeneous multi-agent systems. Seven
  progressive demos, one Temporal dev server, zero infrastructure headaches.
description: |-
  A progressive workshop showing how to build production-grade AI agents
  with the OpenAI Agents SDK and Temporal for durable execution.

  Starting from a hand-written agentic loop, you add the OpenAI Agents SDK
  integration, MCP tool servers, human-in-the-loop signals, multi-agent
  orchestration with child workflows and Nexus, and finally heterogeneous
  agents spanning different frameworks and languages.

  Each demo adds exactly one capability so you can see before and after
  in the Temporal Web UI.
